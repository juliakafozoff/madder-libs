[build]
  base = "client"
  command = "yarn install --frozen-lockfile && CI=false yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = ""

[[edge_functions]]
  function = "og-tags"
  path = "/start/*"

[[edge_functions]]
  function = "og-tags"
  path = "/result/*"

